name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  GOPRIVATE: github.com/kawai-network/*,github.com/getkawai/*
  GONOSUMDB: github.com/kawai-network/*,github.com/getkawai/*

jobs:
  # Test golang on different operating systems.
  test_versions:
    strategy:
      matrix:
        go: ['1.26']
        os: [ubuntu-latest, macos-latest, windows-latest]
    name: Go ${{ matrix.go }} on ${{ matrix.os }}

    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git auth for private modules
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "Missing GH_TOKEN secret (read access required for private modules)."
            exit 1
          fi
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Test
        run: go test ./... -v -race -cover
